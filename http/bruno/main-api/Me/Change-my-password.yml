info:
  name: 🔑 Change my password
  type: http
  seq: 3000
http:
  method: POST
  url: '{{mainApi}}/v1/me/change-password'
  auth:
    type: bearer
    token: '{{access_token}}'
  body:
    type: json
    data: |-
      {
        "password": "123456789"
      }
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
