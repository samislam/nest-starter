info:
  name: 🔑 Change user password by ID
  type: http
  seq: 8000
http:
  method: POST
  url: '{{mainApi}}/v1/users/:id/change-password'
  auth:
    type: bearer
    token: '{{access_token}}'
  params:
    - name: id
      value: ''
      type: path
  body:
    type: json
    data: |-
      {
        "password": "123456789"
      }
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
