info:
  name: ✏️ Update user by ID
  type: http
  seq: 5000
http:
  method: PATCH
  url: '{{mainApi}}/v1/users/:id'
  auth:
    type: bearer
    token: '{{access_token}}'
  params:
    - name: id
      value: ''
      type: path
  body:
    type: json
    data: |-
      {
        "name": "Updated name"
      }
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
